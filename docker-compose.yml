services:
  frontend:
    build: frontend
    ports:
      - 80:8000
    restart: always
    networks:
      container_network:
        ipv4_address: 10.69.42.101
    depends_on:
      - backend
  backend:
    build: backend
    ports:
      - 8001:8000
    restart: always
    networks:
      container_network:
        ipv4_address: 10.69.42.102
networks:
  container_network:
    ipam:
      driver: default
      config:
        - subnet: 10.69.42.0/24
